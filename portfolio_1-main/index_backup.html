    <style>
        :root {
            --bg: #050508;

            --white: #f0f4ff;

            --border: rgba(0, 245, 255, 0.12);

        body {
            background-color: var(--bg);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
            cursor: none;
        }

        a,
        button,
        [role="button"],
        input,
        textarea {
            cursor: none;
        }

        /* SVG noise grain overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Scanline CSS overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background: repeating-linear-gradient(to bottom,
                    transparent 0px,
                    transparent 1px,
                    #000 1px,
                    #000 2px);
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .glitch::before {
            left: 4px;
            text-shadow: -2px 0 var(--amber);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: glitch-anim-1 1.5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -4px;
            text-shadow: -2px 0 var(--cyan);
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            animation: glitch-anim-2 1.5s infinite linear alternate-reverse;
        }

        .glitch.stabilized::before,
        .glitch.stabilized::after {
            display: none;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: polygon(0 20%, 100% 20%, 100% 21%, 0 21%);
            }

            20% {
                clip-path: polygon(0 33%, 100% 33%, 100% 33%, 0 33%);
            }

            40% {
                clip-path: polygon(0 44%, 100% 44%, 100% 44%, 0 44%);
            }

            50% {
                clip-path: polygon(0 50%, 100% 50%, 100% 20%, 0 20%);
            }

            60% {
                clip-path: polygon(0 70%, 100% 70%, 100% 70%, 0 70%);
            }

            70% {
                clip-path: polygon(0 80%, 100% 80%, 100% 80%, 0 80%);
            }

            80% {
                clip-path: polygon(0 50%, 100% 50%, 100% 55%, 0 55%);
            }

            100% {
                clip-path: polygon(0 70%, 100% 70%, 100% 80%, 0 80%);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: polygon(0 25%, 100% 25%, 100% 30%, 0 30%);
            }

            15% {
                clip-path: polygon(0 3%, 100% 3%, 100% 3%, 0 3%);
            }

            22% {
                clip-path: polygon(0 5%, 100% 5%, 100% 20%, 0 20%);
            }

            31% {
                clip-path: polygon(0 20%, 100% 20%, 100% 20%, 0 20%);
            }

            45% {
                clip-path: polygon(0 40%, 100% 40%, 100% 40%, 0 40%);
            }

            51% {
                clip-path: polygon(0 52%, 100% 52%, 100% 59%, 0 59%);
            }

            63% {
                clip-path: polygon(0 60%, 100% 60%, 100% 60%, 0 60%);
            }

            76% {
                clip-path: polygon(0 75%, 100% 75%, 100% 75%, 0 75%);
            }

            81% {
                clip-path: polygon(0 65%, 100% 65%, 100% 40%, 0 40%);
            }

            100% {
                clip-path: polygon(0 45%, 100% 45%, 100% 50%, 0 50%);
            }
        }

        .glow-shadow {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4), 0 0 60px rgba(0, 245, 255, 0.15);
        }

        .glow-text {
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.6), 0 0 80px rgba(0, 245, 255, 0.3);
        }

        .pulse-ring {
            animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .bounce-y {
            animation: bounce-y 2s infinite ease-in-out;
        }

        @keyframes bounce-y {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(10px);
            }
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .rotating-border {
            position: relative;
            background: #0d0d1a;
            padding: 2px;
            border-radius: 0.5rem;
            z-index: 1;
        }

        .rotating-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 0.6rem;
            background: conic-gradient(from var(--angle), transparent 70%, var(--cyan), transparent);
            animation: rotate 3s linear infinite;

        }

        @keyframes rotate {

        .clip-hex {

        .shimmer-bg {

            background-size: 200% auto;

        }

        @keyframes shimmer {
            0% {

            }

            }
        }

        .dashed-ring {
            border: 2px dashed var(--cyan);
            border-radius: 50%;

        @keyframes spin {

        ::-webkit-scrollbar {

            mask-image: radial-gradient(circle, black 40%, transparent 70%);
        }

        // Components
        function Cursor() {
            const cursorDot = useRef(null);
            const cursorRing = useRef(null);

            useEffect(() => {
                let mouseX = window.innerWidth / 2;
                let mouseY = window.innerHeight / 2;
                let ringX = mouseX;
                let ringY = mouseY;

                const onMouseMove = (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                    if (cursorDot.current) cursorDot.current.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
                };
                document.addEventListener('mousemove', onMouseMove);

                const animate = () => {
                    ringX += (mouseX - ringX) * 0.12;
                    ringY += (mouseY - ringY) * 0.12;
                    if (cursorRing.current) cursorRing.current.style.transform = `translate(${ringX}px, ${ringY}px)`;
                    requestAnimationFrame(animate);
                };
                animate();
                return () => document.removeEventListener('mousemove', onMouseMove);
            }, []);

            return (
                <>
                    <div ref={cursorDot} className="fixed top-0 left-0 w-[10px] h-[10px] bg-cyan rounded-full pointer-events-none z-[10000] -ml-[5px] -mt-[5px]" />
                    <div ref={cursorRing} className="fixed top-0 left-0 w-[28px] h-[28px] border-2 border-cyan rounded-full pointer-events-none z-[9999] transition-all duration-100 ease-out -ml-[14px] -mt-[14px]" />
                </>
            );
        }

        function Background3D() {
            const mountRef = useRef(null);

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x050508, 0.008);
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 20;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);

                const particleGeo = new THREE.BufferGeometry();
                const particleCount = 3000;
                const posArray = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount * 3; i += 3) {
                    const r = 80 * Math.cbrt(Math.random());
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    posArray[i] = r * Math.sin(phi) * Math.cos(theta);
                    posArray[i + 1] = r * Math.sin(phi) * Math.sin(theta);
                    posArray[i + 2] = r * Math.cos(phi);
                }
                particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particleMat = new THREE.PointsMaterial({ size: 0.08, color: 0x00f5ff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
                const particlesMesh = new THREE.Points(particleGeo, particleMat);
                scene.add(particlesMesh);

                const grid = new THREE.GridHelper(200, 40, 0x00f5ff, 0x00f5ff);
                grid.position.y = -15;
                grid.material.opacity = 0.08;
                grid.material.transparent = true;
                scene.add(grid);

                const shapes = [];
                const shapeGeos = [new THREE.IcosahedronGeometry(2, 0), new THREE.OctahedronGeometry(2, 0), new THREE.TorusGeometry(1.5, 0.5, 8, 12)];
                const shapeMat = new THREE.MeshBasicMaterial({ color: 0x00f5ff, wireframe: true, transparent: true, opacity: 0.15 });
                for (let i = 0; i < 6; i++) {
                    const mesh = new THREE.Mesh(shapeGeos[i % 3], shapeMat);
                    mesh.position.set((Math.random() - 0.5) * 40, (Math.random() - 0.5) * 30, -5 - Math.random() * 25);
                    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    mesh.userData = { rx: 0.003 + Math.random() * 0.005, ry: 0.003 + Math.random() * 0.005, baseY: mesh.position.y };
                    shapes.push(mesh);
                    scene.add(mesh);
                }

                const ambientLight = new THREE.AmbientLight(0x00f5ff, 0.3);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xff6b00, 0.5, 100);
                scene.add(pointLight);

                let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
                const onDocumentMouseMove = (e) => {
                    mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
                    mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
                };
                document.addEventListener('mousemove', onDocumentMouseMove);

                const onScroll = () => {
                    const sy = window.scrollY;
                    shapes.forEach(shape => shape.position.y = shape.userData.baseY + sy * 0.01);
                };
                window.addEventListener('scroll', onScroll);

                let time = 0;
                const animate = () => {
                    requestAnimationFrame(animate);
                    time += 0.01;
                    targetX = mouseX * 0.5;
                    targetY = mouseY * 0.5;

                    particlesMesh.rotation.y += 0.0003;
                    particlesMesh.rotation.x += 0.0001;
                    particlesMesh.position.x += (targetX - particlesMesh.position.x) * 0.05;
                    particlesMesh.position.y += (-targetY - particlesMesh.position.y) * 0.05;

                    shapes.forEach(shape => { shape.rotation.x += shape.userData.rx; shape.rotation.y += shape.userData.ry; });

                    pointLight.position.x = Math.sin(time * 0.5) * 30;
                    pointLight.position.z = Math.cos(time * 0.5) * 30;
                    pointLight.position.y = Math.sin(time * 0.3) * 20;

                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    document.removeEventListener('mousemove', onDocumentMouseMove);
                    window.removeEventListener('scroll', onScroll);
                    if (mountRef.current) mountRef.current.removeChild(renderer.domElement);
                    renderer.dispose();
                };
            }, []);

            return <div ref={mountRef} className="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none" />;
        }

        function Preloader({ onComplete }) {
            const [progress, setProgress] = useState(0);
            const [logs, setLogs] = useState([]);
            const [isFading, setIsFading] = useState(false);
            const fullLogs = ["> Loading modules...", "> Connecting to cloud...", "> Mounting components...", "> Calibrating 3D engine...", "> Welcome, Recruiter."];

            useEffect(() => {
                let p = 0;
                const interval = setInterval(() => { p += 2; setProgress(p); if (p >= 100) clearInterval(interval); }, 36);
                fullLogs.forEach((log, i) => setTimeout(() => setLogs(prev => [...prev, log]), 400 + i * 200));
                setTimeout(() => { setIsFading(true); setTimeout(onComplete, 200); }, 2400);
                return () => clearInterval(interval);
            }, []);

            if (isFading) return <div className="fixed inset-0 bg-white z-[9999] animate-ping" />;

            return (
                <div className="fixed inset-0 bg-[#050508] z-[9999] flex flex-col items-center justify-center font-mono">
                    <h1 className="text-cyan text-xl mb-4">INITIALIZING PORTFOLIO...</h1>
                    <div className="w-64 h-2 border border-cyan/30 rounded overflow-hidden mb-4">
                        <div className="h-full bg-cyan transition-all duration-75" style={{ width: `${progress}%` }} />
                    </div>
                    <div className="w-64 text-cyan text-xs text-left h-24">
                        {logs.map((l, i) => <div key={i}>{l}</div>)}
                    </div>
                </div>
            );
        }

        function Typewriter({ texts }) {
            const [idx, setIdx] = useState(0);
            const [text, setText] = useState('');
            const [isDel, setIsDel] = useState(false);

            useEffect(() => {
                const fullText = texts[idx];
                let speed = isDel ? 40 : 80;

                if (!isDel && text === fullText) { speed = 1200; setIsDel(true); }
                else if (isDel && text === '') { setIsDel(false); setIdx((idx + 1) % texts.length); speed = 500; }

                const timeout = setTimeout(() => setText(fullText.substring(0, text.length + (isDel ? -1 : 1))), speed);
                return () => clearTimeout(timeout);
            }, [text, isDel, idx, texts]);

            return <span>{text}<span className="animate-pulse">▮</span></span>;
        }

        function AnimatedCounter({ value, isFloat }) {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, amount: 0.5 });

            useEffect(() => {
                if (isInView) {
                    let start;
                    const animate = (timestamp) => {
                        if (!start) start = timestamp;
                        const progress = timestamp - start;
                        const easeOut = 1 - Math.pow(1 - Math.min(progress / 2000, 1), 3);
                        const current = easeOut * value;
                        setCount(isFloat ? current.toFixed(2) : Math.floor(current));
                        if (progress < 2000) requestAnimationFrame(animate);
                        else setCount(isFloat ? value.toFixed(2) : value);
                    };
                    requestAnimationFrame(animate);
                }
            }, [isInView, value, isFloat]);

            return <span ref={ref}>{count}</span>;
        }

        function AnimatedChart({ data }) {
            const [dashOffset, setDashOffset] = useState(1000);
            const chartRef = useRef(null);
            const isInView = useInView(chartRef, { once: true, amount: 0.5 });

            useEffect(() => {
                if (isInView) {
                    let start;
                    const animate = (timestamp) => {
                        if (!start) start = timestamp;
                        const progress = timestamp - start;
                        const easeOut = 1 - Math.pow(1 - Math.min(progress / 1500, 1), 3);
                        setDashOffset(1000 * (1 - easeOut));
                        if (progress < 1500) requestAnimationFrame(animate);
                    };
                    requestAnimationFrame(animate);
                }
            }, [isInView]);

            const pts = data.map((v, i) => [10 + i * 20, 90 - (v - 9) * 80]);
            const pathD = `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]} L ${pts[2][0]} ${pts[2][1]} L ${pts[3][0]} ${pts[3][1]} L ${pts[4][0]} ${pts[4][1]}`;

            return (
                <svg ref={chartRef} viewBox="0 0 100 100" className="w-full h-48 drop-shadow-[0_0_15px_rgba(0,245,255,0.4)]">
                    {[20, 40, 60, 80].map(y => <line key={y} x1="0" y1={y} x2="100" y2={y} stroke="rgba(0,245,255,0.1)" strokeWidth="0.5" />)}
                    <path d={pathD} fill="none" stroke="#00f5ff" strokeWidth="2" strokeDasharray="1000" strokeDashoffset={dashOffset} />
                    {isInView && pts.map((p, i) => (
                        <motion.circle key={i} cx={p[0]} cy={p[1]} r="2" fill="#00f5ff" initial={{ scale: 0 }} animate={{ scale: 1 }} transition={{ delay: 0.2 + i * 0.1 }} className="drop-shadow-[0_0_5px_#ff6b00]" />
                    ))}
                    {[1, 2, 3, 4, 5].map(i => <text key={i} x={10 + (i - 1) * 20} y="98" fill="#8892a4" fontSize="4" fontFamily="monospace" textAnchor="middle">Sem{i}</text>)}
                </svg>
            );
        }

        function TiltCard({ children, className }) {
            const cardRef = useRef(null);
            const highlightRef = useRef(null);

            const handleMouseMove = (e) => {
                if (!cardRef.current || !highlightRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / centerY) * -12;
                const rotateY = ((x - centerX) / centerX) * 12;

                cardRef.current.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                highlightRef.current.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.1), transparent 40%)`;
            };

            const handleMouseLeave = () => {
                if (!cardRef.current || !highlightRef.current) return;
                cardRef.current.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
                cardRef.current.style.transition = `transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)`;
                highlightRef.current.style.background = `transparent`;
                setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ''; }, 500);
            };

            return (
                <div ref={cardRef} className={`relative rotating-border ${className}`} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}>
                    <div className="absolute inset-0 z-10 pointer-events-none" ref={highlightRef} />
                    <div className="bg-card w-full h-full relative z-0 p-6 rounded-lg overflow-hidden flex flex-col">{children}</div>
                </div>
            );
        }

        function Footer() {
            const [showTop, setShowTop] = useState(false);
            useEffect(() => {
                const handleScroll = () => setShowTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <footer className="bg-card py-12 relative border-t border-border">
                    <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan to-transparent shadow-[0_0_10px_#00f5ff]"></div>

                    </div>
                    <AnimatePresence>
                        {showTop && (
                            <motion.button initial={{ opacity: 0, scale: 0 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0 }} onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="fixed bottom-8 right-8 w-12 h-12 bg-cyan text-bg2 rounded-full flex items-center justify-center hover:scale-110 hover:shadow-[0_0_15px_#00f5ff] transition-all z-[90]">
                                <i className="fa-solid fa-arrow-up"></i>
                            </motion.button>

            );
